<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <!-- Draft mascot — fingerprint creature for PricePrint
       Cuddly register, designed to sit beside the wordmark as a stamp.
       Three sizes side-by-side so we can eyeball legibility at small sizes.
  -->

  <defs>
    <!-- Reusable mascot — single source so all three sizes scale -->
    <symbol id="loop" viewBox="0 0 100 120">
      <!-- Body: fingertip shape, brand green -->
      <path d="M 50 8
               C 76 8, 88 32, 88 62
               C 88 85, 73 112, 50 112
               C 27 112, 12 85, 12 62
               C 12 32, 24 8, 50 8 Z"
            fill="#0a5e44" />

      <!-- Fingerprint arcs — concentric loops opening toward the bottom,
           drawn in cream so they sit on the green body. -->
      <g fill="none" stroke="#fefdf5" stroke-width="3" stroke-linecap="round">
        <path d="M 22 70 C 22 38, 78 38, 78 70" />
        <path d="M 30 70 C 30 46, 70 46, 70 70" />
        <path d="M 38 70 C 38 54, 62 54, 62 70" />
        <path d="M 46 70 C 46 62, 54 62, 54 70" />
      </g>

      <!-- Eyes — sit ABOVE the fingerprint loops so the face reads first -->
      <circle cx="38" cy="42" r="5.5" fill="#fefdf5" />
      <circle cx="62" cy="42" r="5.5" fill="#fefdf5" />
      <circle cx="38" cy="42" r="2"   fill="#0a5e44" />
      <circle cx="62" cy="42" r="2"   fill="#0a5e44" />

      <!-- Tiny highlight to give the eyes life -->
      <circle cx="39.5" cy="40.5" r="0.9" fill="#fefdf5" />
      <circle cx="63.5" cy="40.5" r="0.9" fill="#fefdf5" />

      <!-- Smile — soft curve, sits between fingerprint arcs -->
      <path d="M 43 86 Q 50 92 57 86"
            fill="none" stroke="#fefdf5" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" />
    </symbol>

    <!-- Monochrome variant — for the receipt watermark and favicon edge cases -->
    <symbol id="loop-mono" viewBox="0 0 100 120">
      <path d="M 50 8
               C 76 8, 88 32, 88 62
               C 88 85, 73 112, 50 112
               C 27 112, 12 85, 12 62
               C 12 32, 24 8, 50 8 Z"
            fill="none" stroke="#0a5e44" stroke-width="4" />
      <g fill="none" stroke="#0a5e44" stroke-width="3" stroke-linecap="round">
        <path d="M 22 70 C 22 38, 78 38, 78 70" />
        <path d="M 30 70 C 30 46, 70 46, 70 70" />
        <path d="M 38 70 C 38 54, 62 54, 62 70" />
        <path d="M 46 70 C 46 62, 54 62, 54 70" />
      </g>
      <circle cx="38" cy="42" r="4" fill="#0a5e44" />
      <circle cx="62" cy="42" r="4" fill="#0a5e44" />
      <path d="M 43 86 Q 50 92 57 86"
            fill="none" stroke="#0a5e44" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round" />
    </symbol>
  </defs>

  <!-- Cream paper backdrop -->
  <rect width="600" height="280" fill="#d5d0be" />
  <rect x="20" y="20" width="560" height="240" fill="#fefdf5"
        stroke="#a8a294" stroke-width="1" stroke-dasharray="4 3" />

  <!-- Big — design reference size -->
  <use href="#loop" x="60"  y="60" width="160" height="192" />
  <text x="140" y="270" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="11"
        font-weight="700" fill="#5a5751" letter-spacing="0.1em">
    160 px
  </text>

  <!-- Medium — favicon target -->
  <use href="#loop" x="270" y="100" width="80" height="96" />
  <text x="310" y="220" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="10"
        font-weight="700" fill="#5a5751" letter-spacing="0.1em">
    80 px
  </text>

  <!-- Tiny — favicon worst case -->
  <use href="#loop" x="390" y="120" width="32" height="38.4" />
  <text x="406" y="180" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="9"
        font-weight="700" fill="#5a5751" letter-spacing="0.08em">
    32 px
  </text>

  <!-- Monochrome variant for the watermark — alongside wordmark style -->
  <use href="#loop-mono" x="460" y="100" width="80" height="96" />
  <text x="500" y="220" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="10"
        font-weight="700" fill="#5a5751" letter-spacing="0.1em">
    MONO
  </text>
</svg>
