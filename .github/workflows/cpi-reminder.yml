name: CPI quarterly check

# Reminds the team to review the hardcoded U.S. CPI value used on the Inflation
# screen. Opens a tracking issue 4× a year. The values live in
# js/inflation.js — US_CPI_ANNUAL and US_CPI_AS_OF.
#
# Trigger:
#   - automatically: first day of Jan, Apr, Jul, Oct at 09:00 UTC
#   - manually: GitHub UI → Actions → CPI quarterly check → Run workflow

on:
  schedule:
    - cron: '0 9 1 1,4,7,10 *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  open-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Read current CPI constants
        id: cpi
        run: |
          # Pull the current hardcoded values from inflation.js so the issue
          # body shows exactly what's deployed.
          VALUE=$(grep "const US_CPI_ANNUAL" js/inflation.js | head -1 | grep -oE "[0-9]+\.[0-9]+" | head -1)
          AS_OF=$(grep "const US_CPI_AS_OF"  js/inflation.js | head -1 | grep -oE "'[^']+'" | head -1 | tr -d "'")
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"
          echo "as_of=$AS_OF" >> "$GITHUB_OUTPUT"

      - name: Avoid duplicates — check for an existing open reminder
        id: dedupe
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'cpi-reminder',
              state: 'open',
              per_page: 1,
            });
            core.setOutput('skip', data.length > 0 ? 'true' : 'false');

      - name: Open quarterly reminder issue
        if: steps.dedupe.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          CPI_VALUE: ${{ steps.cpi.outputs.value }}
          CPI_AS_OF: ${{ steps.cpi.outputs.as_of }}
        with:
          script: |
            const value = process.env.CPI_VALUE;
            const asOf  = process.env.CPI_AS_OF;
            const today = new Date().toISOString().slice(0, 10);
            const body = [
              '## Quarterly CPI review',
              '',
              `Current hardcoded values in [\`js/inflation.js\`](../blob/main/js/inflation.js):`,
              '',
              `- \`US_CPI_ANNUAL = ${value}\`  (percent year-over-year)`,
              `- \`US_CPI_AS_OF  = '${asOf}'\`  (label shown to users)`,
              '',
              '### What to do',
              '',
              '1. Open the [BLS CPI summary](https://www.bls.gov/cpi/) and find the latest **All items · 12-month change**.',
              `2. Compare it to our current value of **${value}%**.`,
              '3. If the actual rate has drifted **more than 0.3 percentage points**, update both constants in `js/inflation.js` and ship.',
              '4. If still accurate, **just close this issue** — the workflow will re-open it next quarter.',
              '',
              '### Why this matters',
              '',
              'The Inflation screen compares the user\'s personal grocery inflation against this number. Stale values make the comparison less honest. The label `(year ending ' + asOf + ')` is the disclosure mechanism — if it lags reality by more than a year readers will notice.',
              '',
              `_Reminder generated automatically on ${today}._`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🗓 CPI quarterly review · current value ${value}% (as of ${asOf})`,
              body,
              labels: ['cpi-reminder', 'maintenance'],
            });
